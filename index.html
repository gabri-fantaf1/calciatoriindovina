<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Indovina il Calciatore</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@400;500;600&display=swap');
:root{--pitch:#1a3a1f;--green:#4ade80;--white:#f0f4f0;--gray:#8a9e8d;--card:#0f2412;--border:#2d5433;--accent:#facc15;--red:#f87171;--blue:#60a5fa}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--pitch);color:var(--white);font-family:'Barlow',sans-serif;min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 60px,rgba(255,255,255,.025) 60px,rgba(255,255,255,.025) 61px);pointer-events:none;z-index:0}
#app{position:relative;z-index:1;max-width:700px;margin:0 auto;padding:20px 16px 60px}
header{text-align:center;padding:28px 0 20px}
header .eyebrow{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:600;letter-spacing:3px;text-transform:uppercase;color:var(--green);margin-bottom:8px}
header h1{font-family:'Barlow Condensed',sans-serif;font-size:clamp(36px,8vw,58px);font-weight:900;line-height:1;text-transform:uppercase;letter-spacing:-1px}
header h1 span{color:var(--green)}
.db-count{display:inline-block;margin-top:8px;font-family:'Barlow Condensed',sans-serif;font-size:13px;color:var(--gray);background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:20px;padding:3px 12px}
#setup-screen{display:flex;flex-direction:column;gap:20px;margin-top:16px}
.box{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px}
.box h2{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--green);margin-bottom:14px}
.player-list{display:flex;flex-direction:column;gap:10px}
.player-row{display:flex;gap:8px;align-items:center}
.player-input{flex:1;background:rgba(255,255,255,.06);border:1px solid var(--border);border-radius:8px;padding:10px 14px;color:var(--white);font-family:'Barlow',sans-serif;font-size:15px;outline:none;transition:border-color .2s}
.player-input:focus{border-color:var(--green)}
.player-input::placeholder{color:var(--gray)}
.btn-remove{width:34px;height:34px;background:rgba(248,113,113,.12);border:1px solid rgba(248,113,113,.3);border-radius:6px;color:var(--red);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .2s;flex-shrink:0}
.btn-remove:hover{background:rgba(248,113,113,.25)}
.btn-add{margin-top:10px;background:none;border:1px dashed var(--border);border-radius:8px;color:var(--gray);font-family:'Barlow',sans-serif;font-size:14px;padding:10px;cursor:pointer;width:100%;transition:all .2s}
.btn-add:hover{border-color:var(--green);color:var(--green)}
/* MODE SELECTOR */
.mode-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.mode-btn{background:rgba(255,255,255,.04);border:2px solid var(--border);border-radius:10px;padding:14px 10px;cursor:pointer;transition:all .2s;text-align:center}
.mode-btn.active-mode{background:rgba(74,222,128,.1);border-color:var(--green)}
.mode-btn.active-mode.ita{background:rgba(96,165,250,.1);border-color:var(--blue)}
.mode-btn .mode-icon{font-size:26px;margin-bottom:6px}
.mode-btn .mode-name{font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--white)}
.mode-btn .mode-desc{font-size:12px;color:var(--gray);margin-top:3px}
.mode-btn.active-mode .mode-name{color:var(--green)}
.mode-btn.active-mode.ita .mode-name{color:var(--blue)}
.btn-start{background:var(--green);color:#0a1f0d;font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:900;text-transform:uppercase;letter-spacing:2px;border:none;border-radius:12px;padding:18px;cursor:pointer;width:100%;transition:all .2s;margin-top:4px}
.btn-start:hover{background:#86efac;transform:translateY(-1px)}
.btn-start.ita-mode{background:var(--blue);color:#0a1525}
.btn-start.ita-mode:hover{background:#93c5fd}
/* GAME */
#game-screen{display:none}
.game-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;padding-bottom:14px;border-bottom:1px solid var(--border)}
.game-title{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:600;text-transform:uppercase;letter-spacing:2px;color:var(--gray)}
.round-badge{border-radius:20px;padding:4px 12px;font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700}
.round-badge.normal{background:rgba(250,204,21,.12);border:1px solid rgba(250,204,21,.25);color:var(--accent)}
.round-badge.ita{background:rgba(96,165,250,.12);border:1px solid rgba(96,165,250,.25);color:var(--blue)}
.clue-counter{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:900;color:var(--accent)}
.clubs-wrap{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:24px;min-height:54px}
.club-badge{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:9px 16px;font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:700;color:var(--white);display:flex;align-items:center;gap:8px;animation:popIn .4s cubic-bezier(.175,.885,.32,1.275)}
.league-pill{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;border-radius:4px;padding:2px 6px;letter-spacing:1px;color:#fff;flex-shrink:0}
.league-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
@keyframes popIn{from{transform:scale(.7) translateY(8px);opacity:0}to{transform:scale(1) translateY(0);opacity:1}}
.notice{text-align:center;padding:10px;border-radius:8px;margin-bottom:12px;font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:600;letter-spacing:1px;text-transform:uppercase;display:none}
.notice.yellow{background:rgba(250,204,21,.08);border:1px solid rgba(250,204,21,.2);color:var(--accent)}
.mode-banner{text-align:center;padding:7px;border-radius:8px;margin-bottom:14px;font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:600;letter-spacing:2px;text-transform:uppercase;background:rgba(96,165,250,.08);border:1px solid rgba(96,165,250,.2);color:var(--blue);display:none}
.turn-panel{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px 20px;margin-bottom:16px}
.turn-label{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:600;letter-spacing:3px;text-transform:uppercase;color:var(--gray);margin-bottom:4px}
.turn-name{font-family:'Barlow Condensed',sans-serif;font-size:26px;font-weight:900;color:var(--green);text-transform:uppercase}
.feedback{text-align:center;padding:12px;border-radius:10px;font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:700;margin-bottom:14px;animation:fadeSlide .3s ease;display:none}
.feedback.wrong{background:rgba(248,113,113,.12);border:1px solid rgba(248,113,113,.3);color:var(--red)}
.feedback.correct{background:rgba(74,222,128,.15);border:1px solid rgba(74,222,128,.4);color:var(--green)}
@keyframes fadeSlide{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
.guess-area{display:flex;gap:10px;margin-bottom:16px}
.ac-wrap{position:relative;flex:1}
#guess-input{width:100%;background:rgba(255,255,255,.06);border:2px solid var(--border);border-radius:10px;padding:13px 16px;color:var(--white);font-family:'Barlow',sans-serif;font-size:16px;outline:none;transition:border-color .2s}
#guess-input:focus{border-color:var(--green)}
#guess-input::placeholder{color:var(--gray)}
#guess-input:disabled{opacity:.4;cursor:not-allowed}
.btn-guess{background:var(--green);color:#0a1f0d;font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:900;text-transform:uppercase;letter-spacing:1px;border:none;border-radius:10px;padding:13px 20px;cursor:pointer;transition:all .2s;white-space:nowrap}
.btn-guess:hover{background:#86efac}
.btn-guess:disabled{opacity:.4;cursor:not-allowed;background:var(--gray)}
.ac-list{position:absolute;top:calc(100% + 4px);left:0;right:0;background:#0d2010;border:1px solid var(--border);border-radius:10px;z-index:100;max-height:200px;overflow-y:auto;display:none}
.ac-item{padding:10px 16px;cursor:pointer;font-size:15px;border-bottom:1px solid rgba(45,84,51,.4);transition:background .15s}
.ac-item:last-child{border-bottom:none}
.ac-item:hover{background:rgba(74,222,128,.1);color:var(--green)}
.waiting-panel{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px 18px;margin-bottom:14px}
.waiting-label{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:600;letter-spacing:3px;text-transform:uppercase;color:var(--gray);margin-bottom:10px}
.waiting-list{display:flex;flex-wrap:wrap;gap:7px}
.chip{background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:20px;padding:4px 12px;font-size:13px;color:var(--gray)}
.chip.skipped{text-decoration:line-through;opacity:.4}
.btn-row{display:flex;gap:10px;margin-top:4px}
.btn-next{background:rgba(250,204,21,.1);border:1px solid rgba(250,204,21,.3);color:var(--accent);font-family:'Barlow Condensed',sans-serif;font-size:17px;font-weight:700;text-transform:uppercase;letter-spacing:1px;border-radius:10px;padding:13px;cursor:pointer;flex:1;transition:all .2s}
.btn-next:hover{background:rgba(250,204,21,.2)}
.btn-next:disabled{opacity:.3;cursor:not-allowed}
.btn-reveal{background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.3);color:var(--red);font-family:'Barlow Condensed',sans-serif;font-size:17px;font-weight:700;text-transform:uppercase;letter-spacing:1px;border-radius:10px;padding:13px;cursor:pointer;flex:1;transition:all .2s;display:none}
.btn-reveal:hover{background:rgba(248,113,113,.2)}
.reveal-box{text-align:center;padding:16px;background:rgba(248,113,113,.08);border:1px solid rgba(248,113,113,.25);border-radius:10px;margin-bottom:16px;display:none}
.reveal-box .rlabel{font-size:12px;letter-spacing:2px;text-transform:uppercase;color:var(--gray);margin-bottom:4px}
.reveal-box .rname{font-family:'Barlow Condensed',sans-serif;font-size:32px;font-weight:900;color:var(--red)}
.btn-nri{background:var(--green);color:#0a1f0d;font-family:'Barlow Condensed',sans-serif;font-size:17px;font-weight:900;text-transform:uppercase;letter-spacing:2px;border:none;border-radius:10px;padding:13px;cursor:pointer;width:100%;margin-top:10px;transition:all .2s;display:none}
.btn-nri:hover{background:#86efac}
/* WIN */
#win-screen{display:none;text-align:center}
.win-emoji{font-size:72px;margin-bottom:12px}
.win-title{font-family:'Barlow Condensed',sans-serif;font-size:48px;font-weight:900;text-transform:uppercase;color:var(--green);line-height:1;margin-bottom:6px}
.win-sub{font-size:18px;color:var(--gray);margin-bottom:6px}
.win-pname{font-family:'Barlow Condensed',sans-serif;font-size:36px;font-weight:900;color:var(--accent);margin-bottom:4px}
.win-info{font-size:13px;color:var(--gray);margin-bottom:28px}
.scores-table{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:20px;text-align:left}
.scores-hdr{padding:12px 18px;font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:600;letter-spacing:3px;text-transform:uppercase;color:var(--gray);border-bottom:1px solid var(--border)}
.score-row{display:flex;align-items:center;justify-content:space-between;padding:12px 18px;border-bottom:1px solid rgba(45,84,51,.4)}
.score-row:last-child{border-bottom:none}
.score-row.winner{background:rgba(74,222,128,.07)}
.score-pos{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;color:var(--gray);width:28px}
.score-name{flex:1;font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:700;text-transform:uppercase}
.score-pts{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:900;color:var(--green)}
.btn-new-round{background:var(--green);color:#0a1f0d;font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:900;text-transform:uppercase;letter-spacing:2px;border:none;border-radius:12px;padding:16px;cursor:pointer;width:100%;margin-bottom:10px;transition:all .2s}
.btn-new-round:hover{background:#86efac}
.btn-end{background:none;border:1px solid var(--border);color:var(--gray);font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:600;text-transform:uppercase;letter-spacing:1px;border-radius:10px;padding:12px;cursor:pointer;width:100%;transition:all .2s}
.btn-end:hover{border-color:var(--red);color:var(--red)}
</style>
</head>
<body>
<div id="app">
<header>
  <div class="eyebrow">⚽ Gioco di Calcio</div>
  <h1>Indovina il<br><span>Calciatore</span></h1>
  <span class="db-count" id="db-count"></span>
</header>
<div id="setup-screen">
  <div class="box">
    <h2>👥 Giocatori</h2>
    <div class="player-list" id="player-list">
      <div class="player-row"><input class="player-input" type="text" placeholder="Nome giocatore 1" maxlength="30"></div>
      <div class="player-row"><input class="player-input" type="text" placeholder="Nome giocatore 2" maxlength="30"></div>
    </div>
    <button class="btn-add" id="btn-add">+ Aggiungi giocatore</button>
  </div>
  <div class="box">
    <h2>🎮 Modalità di gioco</h2>
    <div class="mode-grid">
      <button class="mode-btn active-mode" data-mode="all" id="mode-all">
        <div class="mode-icon">🌍</div>
        <div class="mode-name">Tutto il mondo</div>
        <div class="mode-desc">Tutti i calciatori del database</div>
      </button>
      <button class="mode-btn" data-mode="ita" id="mode-ita">
        <div class="mode-icon">🇮🇹</div>
        <div class="mode-name">Solo Italiani</div>
        <div class="mode-desc">Solo calciatori italiani</div>
      </button>
    </div>
  </div>
  <button class="btn-start" id="btn-start">⚽ Inizia Partita</button>
</div>
<div id="game-screen">
  <div class="game-hdr">
    <div class="game-title">Round <span id="round-num">1</span></div>
    <div class="round-badge normal" id="round-badge">Round 1</div>
    <div class="clue-counter"><span id="clues-shown">0</span>/<span id="clues-total">?</span></div>
  </div>
  <div class="mode-banner" id="mode-banner">🇮🇹 Modalità Solo Italiani</div>
  <div class="clubs-wrap" id="clubs-wrap"></div>
  <div class="notice yellow" id="last-notice">🔥 Ultima squadra — risposte infinite!</div>
  <div class="reveal-box" id="reveal-box">
    <div class="rlabel">Nessuno ha indovinato — era</div>
    <div class="rname" id="reveal-name"></div>
  </div>
  <div class="turn-panel">
    <div class="turn-label">Tocca a</div>
    <div class="turn-name" id="current-turn">—</div>
  </div>
  <div class="feedback" id="feedback"></div>
  <div class="guess-area">
    <div class="ac-wrap">
      <input id="guess-input" type="text" placeholder="Scrivi il nome del calciatore..." autocomplete="off">
      <div class="ac-list" id="ac-list"></div>
    </div>
    <button class="btn-guess" id="btn-guess">Conferma</button>
  </div>
  <div class="waiting-panel">
    <div class="waiting-label">In attesa</div>
    <div class="waiting-list" id="waiting-list"></div>
  </div>
  <div class="btn-row">
    <button class="btn-next" id="btn-next">Prossima squadra →</button>
    <button class="btn-reveal" id="btn-reveal">Rivela risposta</button>
  </div>
  <button class="btn-nri" id="btn-nri">▶ Prossimo round</button>
</div>
<div id="win-screen">
  <div class="win-emoji">🏆</div>
  <div class="win-title">Indovinato!</div>
  <div class="win-sub">Ha vinto</div>
  <div class="win-pname" id="win-pname"></div>
  <div class="win-info" id="win-info"></div>
  <div class="scores-table">
    <div class="scores-hdr">Punteggio totale</div>
    <div id="scores-body"></div>
  </div>
  <button class="btn-new-round" id="btn-new-round">▶ Prossimo round</button>
  <button class="btn-end" id="btn-end">Fine partita</button>
</div>
</div>
<script>

{name:"Sandro Mazzola",ita:true,ret:true,clubs:[{n:"Inter Milan",l:"seriea"}]},

document.getElementById('btn-add').addEventListener('click',()=>{

// START
$btnStart.addEventListener('click',()=>{
  const names=[...document.querySelectorAll('.player-input')].map(i=>i.value.trim()).filter(Boolean);
  if(names.length<2){alert('Aggiungi almeno 2 giocatori!');return;}
  S.players=names;S.scores={};S.round=1;S.usedIdx=[];
  names.forEach(n=>S.scores[n]=0);
  $setup.style.display='none';$game.style.display='block';
  // mode badge
  if(S.mode==='ita'){$modeBanner.style.display='block';$roundBadge.className='round-badge ita';}
  else{$modeBanner.style.display='none';$roundBadge.className='round-badge normal';}
  startRound();
});

function getPool(){return S.mode==='ita'?ITA_DB:DATABASE;}

function startRound(){
  $win.style.display='none';$game.style.display='block';
  $clubs.innerHTML='';$lastNotice.style.display='none';
  $revealBox.style.display='none';$btnNRI.style.display='none';$btnReveal.style.display='none';
  hideFB();
  $roundNum.textContent=S.round;$roundBadge.textContent='Round '+S.round;
  S.cluesShown=0;S.currentTurnIdx=0;S.skippedThisClue=[];S.roundOver=false;S.lastClueInfinite=false;
  const pool=getPool().filter((_,i)=>!S.usedIdx.includes(getPool().indexOf(getPool()[i])));
  const filteredPool=getPool().filter(p=>!S.usedIdx.includes(DATABASE.indexOf(p)));
  if(!filteredPool.length){S.usedIdx=[];startRound();return;}
  const pick=filteredPool[Math.floor(Math.random()*filteredPool.length)];
  S.usedIdx.push(DATABASE.indexOf(pick));S.footballer=pick;
  $cluesTotal.textContent=pick.clubs.length;$cluesShown.textContent='0';
  renderWaiting();revealNextClue();
}

function revealNextClue(){
  if(S.roundOver)return;
  const clubs=S.footballer.clubs;
  if(S.cluesShown>=clubs.length)return;
  const club=clubs[S.cluesShown];
  const lg=L[club.l]||L.other;
  const badge=document.createElement('div');badge.className='club-badge';
  badge.innerHTML=`<span class="league-pill" style="background:${lg.c}">${lg.f}</span><span class="league-dot" style="background:${lg.c}"></span><span>${club.n}</span>`;
  $clubs.appendChild(badge);
  S.cluesShown++;$cluesShown.textContent=S.cluesShown;S.skippedThisClue=[];
  const isLast=S.cluesShown===clubs.length;
  if(isLast){S.lastClueInfinite=true;$lastNotice.style.display='block';$btnNext.disabled=true;$btnNext.style.display='none';$btnReveal.style.display='block';}
  else{$btnNext.disabled=false;$btnNext.style.display='block';$btnNext.textContent='Prossima squadra →';$btnReveal.style.display='none';}
  $gi.value='';$gi.disabled=false;$bg.disabled=false;hideFB();hideAC();renderWaiting();$gi.focus();
}

function nextTurn(){
  if(S.roundOver)return;
  const active=S.players.map((_,i)=>i).filter(i=>!S.skippedThisClue.includes(i));
  if(active.length===0){
    if(S.lastClueInfinite){S.skippedThisClue=[];S.currentTurnIdx=0;$gi.value='';$gi.disabled=false;$bg.disabled=false;hideFB();renderWaiting();$gi.focus();}
    else{showFB('Tutti sbagliato! Prossima squadra...','wrong');$gi.disabled=true;$bg.disabled=true;setTimeout(()=>{if(!S.roundOver)revealNextClue();},1500);}
    return;
  }
  for(let i=1;i<=S.players.length;i++){const c=(S.currentTurnIdx+i)%S.players.length;if(active.includes(c)){S.currentTurnIdx=c;break;}}
  if(!active.includes(S.currentTurnIdx))S.currentTurnIdx=active[0];
  $gi.value='';$gi.disabled=false;$bg.disabled=false;hideFB();hideAC();renderWaiting();$gi.focus();
}

function renderWaiting(){
  $turn.textContent=S.players[S.currentTurnIdx].toUpperCase();
  $wl.innerHTML=S.players.map((name,i)=>{if(i===S.currentTurnIdx)return'';const sk=S.skippedThisClue.includes(i);return`<span class="chip${sk?' skipped':''}">${name}</span>`;}).join('');
}

$bg.addEventListener('click',submitGuess);
$gi.addEventListener('keydown',e=>{if(e.key==='Enter')submitGuess();});

function submitGuess(){
  const val=$gi.value.trim();if(!val)return;
  if(val.toLowerCase()===S.footballer.name.toLowerCase())handleWin();
  else handleWrong();
}

function handleWin(){
  const winner=S.players[S.currentTurnIdx];
  const pts=S.footballer.clubs.length-S.cluesShown+1;
  S.scores[winner]+=pts;S.roundOver=true;
  $gi.disabled=true;$bg.disabled=true;$btnNext.disabled=true;$btnReveal.style.display='none';
  showFB('Corretto! Era '+S.footballer.name+'! +'+pts+' punti','correct');
  setTimeout(()=>{
    $game.style.display='none';$win.style.display='block';
    document.getElementById('win-pname').textContent=winner;
    document.getElementById('win-info').textContent='Indovinato con '+S.cluesShown+' squadr'+(S.cluesShown===1?'a':'e')+' su '+S.footballer.clubs.length+'   +'+pts+' punt'+(pts===1?'o':'i');
    const sorted=[...S.players].sort((a,b)=>S.scores[b]-S.scores[a]);
    document.getElementById('scores-body').innerHTML=sorted.map((name,i)=>`<div class="score-row${name===winner?' winner':''}"><div class="score-pos">${i+1}</div><div class="score-name">${name}${name===winner?' 🏆':''}</div><div class="score-pts">${S.scores[name]}</div></div>`).join('');
  },900);
}

function handleWrong(){
  const name=S.players[S.currentTurnIdx];
  showFB('Sbagliato, '+name+'!'+(S.lastClueInfinite?' Riprova!':' Aspetta la prossima.'),'wrong');
  $gi.disabled=true;$bg.disabled=true;
  if(!S.lastClueInfinite)S.skippedThisClue.push(S.currentTurnIdx);
  else S.currentTurnIdx=(S.currentTurnIdx+1)%S.players.length;
  setTimeout(()=>{if(!S.roundOver)nextTurn();},1200);
}

$btnReveal.addEventListener('click',()=>{
  if(S.roundOver)return;
  S.roundOver=true;$gi.disabled=true;$bg.disabled=true;$btnReveal.style.display='none';
  $revealName.textContent=S.footballer.name;$revealBox.style.display='block';$btnNRI.style.display='block';
  hideFB();$turn.textContent='—';$wl.innerHTML='';
});

$btnNRI.addEventListener('click',()=>{S.round++;startRound();});
$btnNext.addEventListener('click',()=>{if(S.cluesShown<S.footballer.clubs.length&&!S.roundOver){hideFB();revealNextClue();}});

// AUTOCOMPLETE
function getNames(){return S.mode==='ita'?ITA_NAMES:ALL_NAMES;}
$gi.addEventListener('input',()=>{
  const v=$gi.value.trim().toLowerCase();
  const list=document.getElementById('ac-list');
  if(!v||v.length<2){hideAC();return;}
  const m=getNames().filter(n=>n.toLowerCase().includes(v)).slice(0,8);
  if(!m.length){hideAC();return;}
  list.innerHTML=m.map(n=>`<div class="ac-item" data-n="${n}">${n}</div>`).join('');
  list.style.display='block';
  list.querySelectorAll('.ac-item').forEach(el=>{el.addEventListener('click',()=>{$gi.value=el.dataset.n;hideAC();$gi.focus();});});
});
document.addEventListener('click',e=>{if(!e.target.closest('.ac-wrap'))hideAC();});
function hideAC(){document.getElementById('ac-list').style.display='none';}
function showFB(msg,type){$fb.textContent=msg;$fb.className='feedback '+type;$fb.style.display='block';}
function hideFB(){$fb.style.display='none';}

document.getElementById('btn-new-round').addEventListener('click',()=>{S.round++;startRound();});
document.getElementById('btn-end').addEventListener('click',()=>{$win.style.display='none';$setup.style.display='block';});
</script>
</body>
</html>
