<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Indovina il Calciatore</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@400;500;600&display=swap');

  :root {
    --pitch: #1a3a1f;
    --pitch-light: #254d2a;
    --green: #4ade80;
    --white: #f0f4f0;
    --gray: #8a9e8d;
    --card-bg: #0f2412;
    --card-border: #2d5433;
    --accent: #facc15;
    --red: #f87171;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--pitch);
    color: var(--white);
    font-family: 'Barlow', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 60px, rgba(255,255,255,0.025) 60px, rgba(255,255,255,0.025) 61px);
    pointer-events: none;
    z-index: 0;
  }

  #app {
    position: relative;
    z-index: 1;
    max-width: 700px;
    margin: 0 auto;
    padding: 20px 16px 60px;
  }

  header { text-align: center; padding: 28px 0 24px; }
  header .eyebrow {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px; font-weight: 600;
    letter-spacing: 3px; text-transform: uppercase;
    color: var(--green); margin-bottom: 8px;
  }
  header h1 {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: clamp(36px, 8vw, 58px); font-weight: 900;
    line-height: 1; color: var(--white);
    text-transform: uppercase; letter-spacing: -1px;
  }
  header h1 span { color: var(--green); }

  #setup-screen { display: flex; flex-direction: column; gap: 20px; margin-top: 20px; }

  .section-box {
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 12px; padding: 20px;
  }
  .section-box h2 {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 18px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 1px;
    color: var(--green); margin-bottom: 14px;
  }

  .player-list { display: flex; flex-direction: column; gap: 10px; }
  .player-row { display: flex; gap: 8px; align-items: center; }
  .player-input {
    flex: 1;
    background: rgba(255,255,255,0.06);
    border: 1px solid var(--card-border);
    border-radius: 8px; padding: 10px 14px;
    color: var(--white); font-family: 'Barlow', sans-serif;
    font-size: 15px; outline: none; transition: border-color 0.2s;
  }
  .player-input:focus { border-color: var(--green); }
  .player-input::placeholder { color: var(--gray); }

  .btn-remove {
    width: 34px; height: 34px;
    background: rgba(248,113,113,0.12);
    border: 1px solid rgba(248,113,113,0.3);
    border-radius: 6px; color: var(--red);
    font-size: 16px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.2s; flex-shrink: 0;
  }
  .btn-remove:hover { background: rgba(248,113,113,0.25); }

  .btn-add-player {
    margin-top: 10px; background: none;
    border: 1px dashed var(--card-border);
    border-radius: 8px; color: var(--gray);
    font-family: 'Barlow', sans-serif; font-size: 14px;
    padding: 10px; cursor: pointer; width: 100%; transition: all 0.2s;
  }
  .btn-add-player:hover { border-color: var(--green); color: var(--green); }

  .difficulty-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
  .diff-btn {
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--card-border); border-radius: 8px;
    padding: 10px 6px; color: var(--gray);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 14px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 1px;
    cursor: pointer; transition: all 0.2s; text-align: center;
  }
  .diff-btn.active {
    background: rgba(74,222,128,0.12);
    border-color: var(--green); color: var(--green);
  }

  .btn-start {
    background: var(--green); color: #0a1f0d;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 22px; font-weight: 900;
    text-transform: uppercase; letter-spacing: 2px;
    border: none; border-radius: 12px; padding: 18px;
    cursor: pointer; width: 100%; transition: all 0.2s; margin-top: 6px;
  }
  .btn-start:hover { background: #86efac; transform: translateY(-1px); }

  #game-screen { display: none; }

  .game-header {
    display: flex; align-items: center;
    justify-content: space-between;
    margin-bottom: 20px; padding-bottom: 14px;
    border-bottom: 1px solid var(--card-border);
  }
  .game-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 2px; color: var(--gray);
  }
  .round-badge {
    background: rgba(250,204,21,0.12);
    border: 1px solid rgba(250,204,21,0.25);
    border-radius: 20px; padding: 4px 12px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px; font-weight: 700; color: var(--accent);
  }
  .clue-counter {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 22px; font-weight: 900; color: var(--accent);
  }

  .clubs-container {
    display: flex; flex-wrap: wrap; gap: 10px;
    margin-bottom: 24px; min-height: 54px;
  }

  .club-badge {
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 10px; padding: 9px 16px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 16px; font-weight: 700; color: var(--white);
    display: flex; align-items: center; gap: 8px;
    animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  }
  .club-badge .league-dot {
    width: 7px; height: 7px;
    border-radius: 50%; flex-shrink: 0;
  }

  @keyframes popIn {
    from { transform: scale(0.7) translateY(8px); opacity: 0; }
    to { transform: scale(1) translateY(0); opacity: 1; }
  }

  .last-clue-notice {
    text-align: center; padding: 10px;
    background: rgba(250,204,21,0.08);
    border: 1px solid rgba(250,204,21,0.2);
    border-radius: 8px; margin-bottom: 12px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 14px; font-weight: 600;
    letter-spacing: 1px; text-transform: uppercase;
    color: var(--accent); display: none;
  }

  .turn-panel {
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 14px; padding: 18px 20px; margin-bottom: 16px;
  }
  .turn-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px; font-weight: 600;
    letter-spacing: 3px; text-transform: uppercase;
    color: var(--gray); margin-bottom: 4px;
  }
  .turn-name {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 26px; font-weight: 900;
    color: var(--green); text-transform: uppercase;
  }

  .feedback-toast {
    text-align: center; padding: 12px;
    border-radius: 10px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 16px; font-weight: 700;
    letter-spacing: 0.5px; margin-bottom: 14px;
    animation: fadeSlide 0.3s ease; display: none;
  }
  .feedback-toast.wrong {
    background: rgba(248,113,113,0.12);
    border: 1px solid rgba(248,113,113,0.3); color: var(--red);
  }
  .feedback-toast.correct {
    background: rgba(74,222,128,0.15);
    border: 1px solid rgba(74,222,128,0.4); color: var(--green);
  }
  @keyframes fadeSlide {
    from { opacity: 0; transform: translateY(-6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .guess-area { display: flex; gap: 10px; margin-bottom: 16px; }
  .autocomplete-wrap { position: relative; flex: 1; }

  #guess-input {
    width: 100%;
    background: rgba(255,255,255,0.06);
    border: 2px solid var(--card-border);
    border-radius: 10px; padding: 13px 16px;
    color: var(--white); font-family: 'Barlow', sans-serif;
    font-size: 16px; outline: none; transition: border-color 0.2s;
  }
  #guess-input:focus { border-color: var(--green); }
  #guess-input::placeholder { color: var(--gray); }
  #guess-input:disabled { opacity: 0.4; cursor: not-allowed; }

  .btn-guess {
    background: var(--green); color: #0a1f0d;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 16px; font-weight: 900;
    text-transform: uppercase; letter-spacing: 1px;
    border: none; border-radius: 10px; padding: 13px 20px;
    cursor: pointer; transition: all 0.2s; white-space: nowrap;
  }
  .btn-guess:hover { background: #86efac; }
  .btn-guess:disabled { opacity: 0.4; cursor: not-allowed; background: var(--gray); }

  .autocomplete-list {
    position: absolute; top: calc(100% + 4px);
    left: 0; right: 0;
    background: #0d2010;
    border: 1px solid var(--card-border);
    border-radius: 10px; z-index: 100;
    max-height: 200px; overflow-y: auto; display: none;
  }
  .ac-item {
    padding: 10px 16px; cursor: pointer;
    font-size: 15px;
    border-bottom: 1px solid rgba(45,84,51,0.4);
    transition: background 0.15s;
  }
  .ac-item:last-child { border-bottom: none; }
  .ac-item:hover { background: rgba(74,222,128,0.1); color: var(--green); }

  .waiting-panel {
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 12px; padding: 14px 18px; margin-bottom: 14px;
  }
  .waiting-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px; font-weight: 600;
    letter-spacing: 3px; text-transform: uppercase;
    color: var(--gray); margin-bottom: 10px;
  }
  .waiting-list { display: flex; flex-wrap: wrap; gap: 7px; }
  .waiting-chip {
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--card-border);
    border-radius: 20px; padding: 4px 12px;
    font-size: 13px; color: var(--gray); font-family: 'Barlow', sans-serif;
  }
  .waiting-chip.skipped { text-decoration: line-through; opacity: 0.4; }

  .btn-next-clue {
    background: rgba(250,204,21,0.1);
    border: 1px solid rgba(250,204,21,0.3); color: var(--accent);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 17px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 1px;
    border-radius: 10px; padding: 13px;
    cursor: pointer; width: 100%; transition: all 0.2s; margin-top: 4px;
  }
  .btn-next-clue:hover { background: rgba(250,204,21,0.2); }
  .btn-next-clue:disabled { opacity: 0.3; cursor: not-allowed; }

  #win-screen { display: none; text-align: center; }
  .win-emoji { font-size: 72px; margin-bottom: 12px; }
  .win-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 48px; font-weight: 900;
    text-transform: uppercase; color: var(--green);
    line-height: 1; margin-bottom: 6px;
  }
  .win-subtitle { font-size: 18px; color: var(--gray); margin-bottom: 6px; }
  .win-player-name {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 36px; font-weight: 900; color: var(--accent); margin-bottom: 4px;
  }
  .win-info { font-size: 13px; color: var(--gray); margin-bottom: 28px; }

  .scores-table {
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 12px; overflow: hidden;
    margin-bottom: 20px; text-align: left;
  }
  .scores-table-header {
    padding: 12px 18px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px; font-weight: 600;
    letter-spacing: 3px; text-transform: uppercase;
    color: var(--gray); border-bottom: 1px solid var(--card-border);
  }
  .score-row {
    display: flex; align-items: center;
    justify-content: space-between;
    padding: 12px 18px;
    border-bottom: 1px solid rgba(45,84,51,0.4);
  }
  .score-row:last-child { border-bottom: none; }
  .score-row.winner { background: rgba(74,222,128,0.07); }
  .score-pos {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 14px; font-weight: 700; color: var(--gray); width: 28px;
  }
  .score-name {
    flex: 1;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 18px; font-weight: 700; text-transform: uppercase;
  }
  .score-pts {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 22px; font-weight: 900; color: var(--green);
  }

  .btn-new-round {
    background: var(--green); color: #0a1f0d;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 20px; font-weight: 900;
    text-transform: uppercase; letter-spacing: 2px;
    border: none; border-radius: 12px; padding: 16px;
    cursor: pointer; width: 100%; margin-bottom: 10px; transition: all 0.2s;
  }
  .btn-new-round:hover { background: #86efac; }

  .btn-end-game {
    background: none; border: 1px solid var(--card-border);
    color: var(--gray);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 16px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 1px;
    border-radius: 10px; padding: 12px;
    cursor: pointer; width: 100%; transition: all 0.2s;
  }
  .btn-end-game:hover { border-color: var(--red); color: var(--red); }
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="eyebrow">⚽ Gioco di Calcio</div>
    <h1>Indovina il<br><span>Calciatore</span></h1>
  </header>

  <div id="setup-screen">
    <div class="section-box">
      <h2>👥 Giocatori</h2>
      <div class="player-list" id="player-list">
        <div class="player-row">
          <input class="player-input" type="text" placeholder="Nome giocatore 1" maxlength="30">
        </div>
        <div class="player-row">
          <input class="player-input" type="text" placeholder="Nome giocatore 2" maxlength="30">
        </div>
      </div>
      <button class="btn-add-player" id="btn-add-player">+ Aggiungi giocatore</button>
    </div>

    <div class="section-box">
      <h2>🎯 Difficolta</h2>
      <div class="difficulty-row">
        <button class="diff-btn" data-diff="easy">Facile<br><small style="font-size:11px;opacity:0.7">Superstar</small></button>
        <button class="diff-btn active" data-diff="medium">Medio<br><small style="font-size:11px;opacity:0.7">Top giocatori</small></button>
        <button class="diff-btn" data-diff="hard">Difficile<br><small style="font-size:11px;opacity:0.7">Anche riserve</small></button>
      </div>
    </div>

    <button class="btn-start" id="btn-start">⚽ Inizia Partita</button>
  </div>

  <div id="game-screen">
    <div class="game-header">
      <div class="game-title">Round <span id="round-num">1</span></div>
      <div class="round-badge" id="round-badge">Round 1</div>
      <div class="clue-counter"><span id="clues-shown">0</span>/<span id="clues-total">?</span> squadre</div>
    </div>

    <div class="clubs-container" id="clubs-container"></div>
    <div class="last-clue-notice" id="last-clue-notice">🔥 Ultima squadra — risposte infinite!</div>

    <div class="turn-panel">
      <div class="turn-label">Tocca a</div>
      <div class="turn-name" id="current-turn">—</div>
    </div>

    <div class="feedback-toast" id="feedback-toast"></div>

    <div class="guess-area">
      <div class="autocomplete-wrap">
        <input id="guess-input" type="text" placeholder="Scrivi il nome del calciatore..." autocomplete="off">
        <div class="autocomplete-list" id="autocomplete-list"></div>
      </div>
      <button class="btn-guess" id="btn-guess">Conferma</button>
    </div>

    <div class="waiting-panel">
      <div class="waiting-label">In attesa</div>
      <div class="waiting-list" id="waiting-list"></div>
    </div>

    <button class="btn-next-clue" id="btn-next-clue">Prossima squadra →</button>
  </div>

  <div id="win-screen">
    <div class="win-emoji">🏆</div>
    <div class="win-title">Indovinato!</div>
    <div class="win-subtitle">Ha vinto</div>
    <div class="win-player-name" id="win-player-name"></div>
    <div class="win-info" id="win-info"></div>
    <div class="scores-table">
      <div class="scores-table-header">Punteggio totale</div>
      <div id="scores-body"></div>
    </div>
    <button class="btn-new-round" id="btn-new-round">▶ Prossimo round</button>
    <button class="btn-end-game" id="btn-end-game">Fine partita</button>
  </div>
</div>

  ]},
  { name: "Granit Xhaka", diff: "hard", clubs: [

    { name: "Arsenal", league: "premier" },

  ]},
  { name: "Piero Hincapie", diff: "hard", clubs: [

  ]},
  { name: "Jonathan Tah", diff: "hard", clubs: [
    { name: "Bayer Leverkusen", league: "bundesliga" },
    { name: "Bayern Munich", league: "bundesliga" }
  ]},
  { name: "Edmond Tapsoba", diff: "hard", clubs: [
    { name: "Bayer Leverkusen", league: "bundesliga" }
  ]},
  { name: "Alex Grimaldo", diff: "hard", clubs: [
    { name: "Benfica", league: "laliga" },
    { name: "Bayer Leverkusen", league: "bundesliga" }
  ]},
  { name: "Hugo Ekitike", diff: "hard", clubs: [
    { name: "Reims", league: "ligue1" },
    { name: "Paris Saint-Germain", league: "ligue1" },
    { name: "Eintracht Frankfurt", league: "bundesliga" }
  ]},
  { name: "Lois Openda", diff: "hard", clubs: [
    { name: "Vitesse Arnhem", league: "premier" },
    { name: "Lens", league: "ligue1" },
    { name: "RB Leipzig", league: "bundesliga" }
  ]},
  { name: "Xavi Simons", diff: "hard", clubs: [
    { name: "Paris Saint-Germain", league: "ligue1" },
    { name: "PSV Eindhoven", league: "premier" },
    { name: "RB Leipzig", league: "bundesliga" },
    { name: "Paris Saint-Germain", league: "ligue1" }
  ]},
  { name: "Benjamin Sesko", diff: "hard", clubs: [
    { name: "RB Salzburg", league: "bundesliga" },
    { name: "RB Leipzig", league: "bundesliga" },
    { name: "Arsenal", league: "premier" }
  ]},
  { name: "Castello Lukeba", diff: "hard", clubs: [
    { name: "Olympique Lyonnais", league: "ligue1" },
    { name: "RB Leipzig", league: "bundesliga" }
  ]},
];

// All names for autocomplete
const ALL_NAMES = [...new Set(DATABASE.map(p => p.name))].sort();

// =====================
// STATE
// =====================
let state = {
  players: [], scores: {}, difficulty: 'medium', round: 1,
  footballer: null, cluesShown: 0, currentTurnIdx: 0,
  skippedThisClue: [], lastClueInfinite: false, roundOver: false,
  usedIndices: []
};

// =====================
// DOM REFS
// =====================
const $setup = document.getElementById('setup-screen');
const $game  = document.getElementById('game-screen');
const $win   = document.getElementById('win-screen');
const $roundNum = document.getElementById('round-num');
const $roundBadge = document.getElementById('round-badge');
const $cluesShown = document.getElementById('clues-shown');
const $cluesTotal = document.getElementById('clues-total');
const $clubs = document.getElementById('clubs-container');
const $turn  = document.getElementById('current-turn');
const $feedback = document.getElementById('feedback-toast');
const $guessInput = document.getElementById('guess-input');
const $btnGuess = document.getElementById('btn-guess');
const $waiting = document.getElementById('waiting-list');
const $btnNext = document.getElementById('btn-next-clue');
const $lastNotice = document.getElementById('last-clue-notice');

// =====================
// SETUP
// =====================
document.getElementById('btn-add-player').addEventListener('click', () => {
  const list = document.getElementById('player-list');
  if (list.children.length >= 8) return;
  const count = list.children.length + 1;
  const row = document.createElement('div');
  row.className = 'player-row';
  row.innerHTML = `
    <input class="player-input" type="text" placeholder="Nome giocatore ${count}" maxlength="30">
    <button class="btn-remove" onclick="this.parentElement.remove()">x</button>
  `;
  list.appendChild(row);
});

document.querySelectorAll('.diff-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    state.difficulty = btn.dataset.diff;
  });
});

document.getElementById('btn-start').addEventListener('click', () => {
  const names = [...document.querySelectorAll('.player-input')]
    .map(i => i.value.trim()).filter(Boolean);
  if (names.length < 2) { alert('Aggiungi almeno 2 giocatori!'); return; }
  state.players = names;
  state.scores = {};
  names.forEach(n => state.scores[n] = 0);
  state.round = 1;
  state.usedIndices = [];
  $setup.style.display = 'none';
  $game.style.display = 'block';
  startRound();
});

// =====================
// ROUND
// =====================
function startRound() {
  $win.style.display = 'none';
  $game.style.display = 'block';
  $clubs.innerHTML = '';
  $lastNotice.style.display = 'none';
  hideFeedback();
  $roundNum.textContent = state.round;
  $roundBadge.textContent = 'Round ' + state.round;
  state.cluesShown = 0;
  state.currentTurnIdx = 0;
  state.skippedThisClue = [];
  state.roundOver = false;
  state.lastClueInfinite = false;

  // Pick random footballer based on difficulty
  const pool = DATABASE.filter(p => {
    const diffMatch = state.difficulty === 'easy' ? p.diff === 'easy'
      : state.difficulty === 'medium' ? (p.diff === 'easy' || p.diff === 'medium')
      : true;
    return diffMatch && !state.usedIndices.includes(DATABASE.indexOf(p));
  });

  if (pool.length === 0) { state.usedIndices = []; startRound(); return; }

  const pick = pool[Math.floor(Math.random() * pool.length)];
  state.usedIndices.push(DATABASE.indexOf(pick));
  state.footballer = pick;

  $cluesTotal.textContent = pick.clubs.length;
  $cluesShown.textContent = '0';

  renderWaiting();
  revealNextClue();
}

// =====================
// CLUE
// =====================
function revealNextClue() {
  if (state.roundOver) return;
  const clubs = state.footballer.clubs;
  const idx = state.cluesShown;
  if (idx >= clubs.length) return;

  const club = clubs[idx];
  const lg = LEAGUES[club.league] || { flag: '???', color: '#555' };

  const badge = document.createElement('div');
  badge.className = 'club-badge';
  badge.innerHTML = `
    <span style="font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;
      background:${lg.color};color:#fff;border-radius:4px;padding:2px 6px;letter-spacing:1px;">
      ${lg.flag}
    </span>
    <span class="league-dot" style="background:${lg.color}"></span>
    <span>${club.name}</span>
  `;
  $clubs.appendChild(badge);

  state.cluesShown++;
  $cluesShown.textContent = state.cluesShown;
  state.skippedThisClue = [];

  if (state.cluesShown === clubs.length) {
    state.lastClueInfinite = true;
    $lastNotice.style.display = 'block';
    $btnNext.disabled = true;
    $btnNext.textContent = 'Ultima squadra — risposte infinite';
  } else {
    $btnNext.disabled = false;
    $btnNext.textContent = 'Prossima squadra →';
  }

  $guessInput.value = '';
  $guessInput.disabled = false;
  $btnGuess.disabled = false;
  hideFeedback();
  hideAC();
  renderWaiting();
  $guessInput.focus();
}

// =====================
// TURN
// =====================
function nextTurn() {
  if (state.roundOver) return;
  const active = state.players.map((_,i) => i).filter(i => !state.skippedThisClue.includes(i));

  if (active.length === 0) {
    if (state.lastClueInfinite) {
      state.skippedThisClue = [];
      state.currentTurnIdx = 0;
      $guessInput.value = '';
      $guessInput.disabled = false;
      $btnGuess.disabled = false;
      hideFeedback();
      renderWaiting();
      $guessInput.focus();
    } else {
      showFeedback('Tutti sbagliato! Prossima squadra...', 'wrong');
      $guessInput.disabled = true;
      $btnGuess.disabled = true;
      setTimeout(() => { if (!state.roundOver) revealNextClue(); }, 1500);
    }
    return;
  }

  // Find next player in round-robin order
  for (let i = 1; i <= state.players.length; i++) {
    const candidate = (state.currentTurnIdx + i) % state.players.length;
    if (active.includes(candidate)) {
      state.currentTurnIdx = candidate;
      break;
    }
  }
  if (!active.includes(state.currentTurnIdx)) state.currentTurnIdx = active[0];

  $turn.textContent = state.players[state.currentTurnIdx].toUpperCase();
  $guessInput.value = '';
  $guessInput.disabled = false;
  $btnGuess.disabled = false;
  hideFeedback();
  hideAC();
  renderWaiting();
  $guessInput.focus();
}

function renderWaiting() {
  $turn.textContent = state.players[state.currentTurnIdx].toUpperCase();
  const others = state.players.filter((_, i) => i !== state.currentTurnIdx);
  $waiting.innerHTML = others.map(name => {
    const origIdx = state.players.indexOf(name);
    const skipped = state.skippedThisClue.includes(origIdx);
    return `<span class="waiting-chip${skipped ? ' skipped' : ''}">${name}</span>`;
  }).join('');
}

// =====================
// GUESS
// =====================
$btnGuess.addEventListener('click', submitGuess);
$guessInput.addEventListener('keydown', e => { if (e.key === 'Enter') submitGuess(); });

function submitGuess() {
  const val = $guessInput.value.trim();
  if (!val) return;
  const correct = state.footballer.name;
  if (val.toLowerCase() === correct.toLowerCase()) {
    handleWin();
  } else {
    handleWrong();
  }
}

function handleWin() {
  const winner = state.players[state.currentTurnIdx];
  const pts = state.footballer.clubs.length - state.cluesShown + 1;
  state.scores[winner] += pts;
  state.roundOver = true;
  $guessInput.disabled = true;
  $btnGuess.disabled = true;
  $btnNext.disabled = true;
  showFeedback('Corretto! Era ' + state.footballer.name + '!', 'correct');

  setTimeout(() => {
    $game.style.display = 'none';
    $win.style.display = 'block';
    document.getElementById('win-player-name').textContent = winner;
    document.getElementById('win-info').textContent =
      'Indovinato con ' + state.cluesShown + ' squadr' + (state.cluesShown === 1 ? 'a' : 'e') +
      ' su ' + state.footballer.clubs.length + '  +' + pts + ' punt' + (pts === 1 ? 'o' : 'i');

    const sorted = [...state.players].sort((a,b) => state.scores[b] - state.scores[a]);
    document.getElementById('scores-body').innerHTML = sorted.map((name, i) => `
      <div class="score-row${name === winner ? ' winner' : ''}">
        <div class="score-pos">${i+1}</div>
        <div class="score-name">${name}${name === winner ? ' 🏆' : ''}</div>
        <div class="score-pts">${state.scores[name]}</div>
      </div>
    `).join('');
  }, 900);
}

function handleWrong() {
  const name = state.players[state.currentTurnIdx];
  showFeedback(
    'Sbagliato, ' + name + '!' + (state.lastClueInfinite ? ' Riprova!' : ' Aspetta la prossima squadra.'),
    'wrong'
  );
  $guessInput.disabled = true;
  $btnGuess.disabled = true;

  if (!state.lastClueInfinite) {
    state.skippedThisClue.push(state.currentTurnIdx);
  } else {
    state.currentTurnIdx = (state.currentTurnIdx + 1) % state.players.length;
  }

  setTimeout(() => {
    if (state.roundOver) return;
    nextTurn();
  }, 1200);
}

// =====================
// NEXT CLUE
// =====================
$btnNext.addEventListener('click', () => {
  if (state.cluesShown < state.footballer.clubs.length && !state.roundOver) {
    hideFeedback();
    revealNextClue();
  }
});

// =====================
// AUTOCOMPLETE
// =====================
$guessInput.addEventListener('input', () => {
  const val = $guessInput.value.trim().toLowerCase();
  const list = document.getElementById('autocomplete-list');
  if (!val || val.length < 2) { hideAC(); return; }
  const matches = ALL_NAMES.filter(n => n.toLowerCase().includes(val)).slice(0, 8);
  if (!matches.length) { hideAC(); return; }
  list.innerHTML = matches.map(n => `<div class="ac-item" data-name="${n}">${n}</div>`).join('');
  list.style.display = 'block';
  list.querySelectorAll('.ac-item').forEach(item => {
    item.addEventListener('click', () => {
      $guessInput.value = item.dataset.name;
      hideAC();
      $guessInput.focus();
    });
  });
});
document.addEventListener('click', e => { if (!e.target.closest('.autocomplete-wrap')) hideAC(); });
function hideAC() { document.getElementById('autocomplete-list').style.display = 'none'; }

// =====================
// FEEDBACK
// =====================
function showFeedback(msg, type) {
  $feedback.textContent = msg;
  $feedback.className = 'feedback-toast ' + type;
  $feedback.style.display = 'block';
}
function hideFeedback() { $feedback.style.display = 'none'; }

// =====================
// WIN SCREEN
// =====================
document.getElementById('btn-new-round').addEventListener('click', () => {
  state.round++;
  startRound();
});
document.getElementById('btn-end-game').addEventListener('click', () => {
  $win.style.display = 'none';
  $setup.style.display = 'block';
});
</script>
