<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Indovina il Calciatore</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@400;500;600&display=swap');

  :root {
    --pitch: #1a3a1f;
    --pitch-light: #254d2a;
    --green: #4ade80;
    --green-dim: #22c55e;
    --white: #f0f4f0;
    --gray: #8a9e8d;
    --card-bg: #0f2412;
    --card-border: #2d5433;
    --accent: #facc15;
    --red: #f87171;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--pitch);
    color: var(--white);
    font-family: 'Barlow', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Field lines background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      repeating-linear-gradient(
        0deg,
        transparent,
        transparent 60px,
        rgba(255,255,255,0.025) 60px,
        rgba(255,255,255,0.025) 61px
      );
    pointer-events: none;
    z-index: 0;
  }

  #app {
    position: relative;
    z-index: 1;
    max-width: 700px;
    margin: 0 auto;
    padding: 20px 16px 60px;
  }

  /* HEADER */
  header {
    text-align: center;
    padding: 28px 0 24px;
  }
  header .eyebrow {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--green);
    margin-bottom: 8px;
  }
  header h1 {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: clamp(36px, 8vw, 58px);
    font-weight: 900;
    line-height: 1;
    color: var(--white);
    text-transform: uppercase;
    letter-spacing: -1px;
  }
  header h1 span { color: var(--green); }

  /* SETUP SCREEN */
  #setup-screen {
    display: flex;
    flex-direction: column;
    gap: 20px;
    margin-top: 20px;
  }

  .players-section {
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 12px;
    padding: 20px;
  }
  .players-section h2 {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 18px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--green);
    margin-bottom: 14px;
  }

  .player-list { display: flex; flex-direction: column; gap: 10px; }
  .player-row {
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .player-input {
    flex: 1;
    background: rgba(255,255,255,0.06);
    border: 1px solid var(--card-border);
    border-radius: 8px;
    padding: 10px 14px;
    color: var(--white);
    font-family: 'Barlow', sans-serif;
    font-size: 15px;
    outline: none;
    transition: border-color 0.2s;
  }
  .player-input:focus { border-color: var(--green); }
  .player-input::placeholder { color: var(--gray); }

  .btn-remove {
    width: 34px; height: 34px;
    background: rgba(248,113,113,0.12);
    border: 1px solid rgba(248,113,113,0.3);
    border-radius: 6px;
    color: var(--red);
    font-size: 16px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.2s;
    flex-shrink: 0;
  }
  .btn-remove:hover { background: rgba(248,113,113,0.25); }

  .btn-add-player {
    margin-top: 10px;
    background: none;
    border: 1px dashed var(--card-border);
    border-radius: 8px;
    color: var(--gray);
    font-family: 'Barlow', sans-serif;
    font-size: 14px;
    padding: 10px;
    cursor: pointer;
    width: 100%;
    transition: all 0.2s;
  }
  .btn-add-player:hover { border-color: var(--green); color: var(--green); }

  .btn-start {
    background: var(--green);
    color: #0a1f0d;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 22px;
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: 2px;
    border: none;
    border-radius: 12px;
    padding: 18px;
    cursor: pointer;
    width: 100%;
    transition: all 0.2s;
    margin-top: 6px;
  }
  .btn-start:hover { background: #86efac; transform: translateY(-1px); }
  .btn-start:active { transform: translateY(0); }

  /* DIFFICULTY */
  .difficulty-row {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 8px;
  }
  .diff-btn {
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--card-border);
    border-radius: 8px;
    padding: 10px 6px;
    color: var(--gray);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 14px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
  }
  .diff-btn.active {
    background: rgba(74,222,128,0.12);
    border-color: var(--green);
    color: var(--green);
  }

  /* GAME SCREEN */
  #game-screen { display: none; }

  .game-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
    padding-bottom: 14px;
    border-bottom: 1px solid var(--card-border);
  }
  .game-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--gray);
  }
  .clue-counter {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 22px;
    font-weight: 900;
    color: var(--accent);
  }

  /* CLUBS REVEALED */
  .clubs-container {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-bottom: 24px;
    min-height: 54px;
  }

  .club-badge {
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 10px;
    padding: 9px 16px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 16px;
    font-weight: 700;
    color: var(--white);
    display: flex;
    align-items: center;
    gap: 8px;
    animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  }
  .club-badge .flag { font-size: 18px; }
  .club-badge .league-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  @keyframes popIn {
    from { transform: scale(0.7) translateY(8px); opacity: 0; }
    to { transform: scale(1) translateY(0); opacity: 1; }
  }

  .hidden-card {
    background: linear-gradient(135deg, var(--card-bg), rgba(45,84,51,0.3));
    border: 1px dashed var(--card-border);
    border-radius: 10px;
    padding: 9px 20px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 16px;
    font-weight: 600;
    color: var(--gray);
    letter-spacing: 2px;
  }

  /* CURRENT TURN */
  .turn-panel {
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 14px;
    padding: 18px 20px;
    margin-bottom: 16px;
  }
  .turn-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--gray);
    margin-bottom: 4px;
  }
  .turn-name {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 26px;
    font-weight: 900;
    color: var(--green);
    text-transform: uppercase;
  }

  /* GUESS INPUT */
  .guess-area {
    display: flex;
    gap: 10px;
    margin-bottom: 16px;
  }
  #guess-input {
    flex: 1;
    background: rgba(255,255,255,0.06);
    border: 2px solid var(--card-border);
    border-radius: 10px;
    padding: 13px 16px;
    color: var(--white);
    font-family: 'Barlow', sans-serif;
    font-size: 16px;
    outline: none;
    transition: border-color 0.2s;
  }
  #guess-input:focus { border-color: var(--green); }
  #guess-input::placeholder { color: var(--gray); }
  #guess-input:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }

  .btn-guess {
    background: var(--green);
    color: #0a1f0d;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 16px;
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: 1px;
    border: none;
    border-radius: 10px;
    padding: 13px 20px;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .btn-guess:hover { background: #86efac; }
  .btn-guess:disabled { opacity: 0.4; cursor: not-allowed; background: var(--gray); }

  /* FEEDBACK */
  .feedback-toast {
    text-align: center;
    padding: 12px;
    border-radius: 10px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 0.5px;
    margin-bottom: 14px;
    animation: fadeSlide 0.3s ease;
    display: none;
  }
  .feedback-toast.wrong {
    background: rgba(248,113,113,0.12);
    border: 1px solid rgba(248,113,113,0.3);
    color: var(--red);
  }
  .feedback-toast.correct {
    background: rgba(74,222,128,0.15);
    border: 1px solid rgba(74,222,128,0.4);
    color: var(--green);
  }
  @keyframes fadeSlide {
    from { opacity: 0; transform: translateY(-6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* WAITING LIST */
  .waiting-panel {
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 12px;
    padding: 14px 18px;
    margin-bottom: 14px;
  }
  .waiting-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--gray);
    margin-bottom: 10px;
  }
  .waiting-list {
    display: flex;
    flex-wrap: wrap;
    gap: 7px;
  }
  .waiting-chip {
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--card-border);
    border-radius: 20px;
    padding: 4px 12px;
    font-size: 13px;
    color: var(--gray);
    font-family: 'Barlow', sans-serif;
  }
  .waiting-chip.skipped {
    text-decoration: line-through;
    opacity: 0.4;
  }

  /* NEXT CLUE BTN */
  .btn-next-clue {
    background: rgba(250,204,21,0.1);
    border: 1px solid rgba(250,204,21,0.3);
    color: var(--accent);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 17px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    border-radius: 10px;
    padding: 13px;
    cursor: pointer;
    width: 100%;
    transition: all 0.2s;
    margin-top: 4px;
  }
  .btn-next-clue:hover { background: rgba(250,204,21,0.2); }
  .btn-next-clue:disabled { opacity: 0.3; cursor: not-allowed; }

  /* WIN SCREEN */
  #win-screen { display: none; text-align: center; }
  .win-emoji { font-size: 72px; margin-bottom: 12px; }
  .win-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 48px;
    font-weight: 900;
    text-transform: uppercase;
    color: var(--green);
    line-height: 1;
    margin-bottom: 6px;
  }
  .win-subtitle {
    font-size: 18px;
    color: var(--gray);
    margin-bottom: 6px;
  }
  .win-player-name {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 36px;
    font-weight: 900;
    color: var(--accent);
    margin-bottom: 4px;
  }
  .win-clubs-used {
    font-size: 13px;
    color: var(--gray);
    margin-bottom: 28px;
  }

  .scores-table {
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 12px;
    overflow: hidden;
    margin-bottom: 20px;
    text-align: left;
  }
  .scores-table-header {
    padding: 12px 18px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--gray);
    border-bottom: 1px solid var(--card-border);
  }
  .score-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 18px;
    border-bottom: 1px solid rgba(45,84,51,0.4);
    transition: background 0.15s;
  }
  .score-row:last-child { border-bottom: none; }
  .score-row.winner { background: rgba(74,222,128,0.07); }
  .score-pos {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 14px;
    font-weight: 700;
    color: var(--gray);
    width: 28px;
  }
  .score-name {
    flex: 1;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 18px;
    font-weight: 700;
    text-transform: uppercase;
  }
  .score-pts {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 22px;
    font-weight: 900;
    color: var(--green);
  }

  .btn-new-round {
    background: var(--green);
    color: #0a1f0d;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 20px;
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: 2px;
    border: none;
    border-radius: 12px;
    padding: 16px;
    cursor: pointer;
    width: 100%;
    margin-bottom: 10px;
    transition: all 0.2s;
  }
  .btn-new-round:hover { background: #86efac; }

  .btn-end-game {
    background: none;
    border: 1px solid var(--card-border);
    color: var(--gray);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 16px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
    border-radius: 10px;
    padding: 12px;
    cursor: pointer;
    width: 100%;
    transition: all 0.2s;
  }
  .btn-end-game:hover { border-color: var(--red); color: var(--red); }

  /* LOADING */
  .loading-state {
    text-align: center;
    padding: 40px 20px;
  }
  .spinner {
    width: 40px; height: 40px;
    border: 3px solid var(--card-border);
    border-top-color: var(--green);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 16px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--gray);
  }

  /* LEAGUE COLORS */
  .league-premier { background: #3d0099; }
  .league-seriea   { background: #0066cc; }
  .league-laliga   { background: #e30613; }
  .league-bundesliga { background: #d20515; }
  .league-ligue1   { background: #f0941f; }

  /* Autocomplete */
  .autocomplete-wrap { position: relative; flex: 1; }
  .autocomplete-list {
    position: absolute;
    top: calc(100% + 4px);
    left: 0; right: 0;
    background: #0d2010;
    border: 1px solid var(--card-border);
    border-radius: 10px;
    z-index: 100;
    max-height: 200px;
    overflow-y: auto;
  }
  .ac-item {
    padding: 10px 16px;
    cursor: pointer;
    font-size: 15px;
    border-bottom: 1px solid rgba(45,84,51,0.4);
    transition: background 0.15s;
  }
  .ac-item:last-child { border-bottom: none; }
  .ac-item:hover, .ac-item.selected { background: rgba(74,222,128,0.1); color: var(--green); }

  /* Rounds info */
  .round-badge {
    background: rgba(250,204,21,0.12);
    border: 1px solid rgba(250,204,21,0.25);
    border-radius: 20px;
    padding: 4px 12px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px;
    font-weight: 700;
    color: var(--accent);
  }

  .last-clue-notice {
    text-align: center;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--accent);
    padding: 10px;
    background: rgba(250,204,21,0.08);
    border: 1px solid rgba(250,204,21,0.2);
    border-radius: 8px;
    margin-bottom: 12px;
    display: none;
  }

  .correct-answer-reveal {
    text-align: center;
    padding: 16px;
    background: rgba(248,113,113,0.08);
    border: 1px solid rgba(248,113,113,0.25);
    border-radius: 10px;
    margin-bottom: 16px;
    display: none;
  }
  .correct-answer-reveal .label {
    font-size: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--gray);
    margin-bottom: 4px;
  }
  .correct-answer-reveal .name {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 28px;
    font-weight: 900;
    color: var(--red);
  }
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="eyebrow">⚽ Gioco di Calcio</div>
    <h1>Indovina il<br><span>Calciatore</span></h1>
  </header>

  <!-- SETUP -->
  <div id="setup-screen">
    <div class="players-section">
      <h2>👥 Giocatori</h2>
      <div class="player-list" id="player-list">
        <div class="player-row">
          <input class="player-input" type="text" placeholder="Nome giocatore 1" maxlength="30">
        </div>
        <div class="player-row">
          <input class="player-input" type="text" placeholder="Nome giocatore 2" maxlength="30">
        </div>
      </div>
      <button class="btn-add-player" id="btn-add-player">+ Aggiungi giocatore</button>
    </div>

    <div class="players-section">
      <h2>🎯 Difficoltà</h2>
      <div class="difficulty-row">
        <button class="diff-btn" data-diff="easy">Facile<br><small style="font-size:11px;opacity:0.7">Stelle note</small></button>
        <button class="diff-btn active" data-diff="medium">Medio<br><small style="font-size:11px;opacity:0.7">Top giocatori</small></button>
        <button class="diff-btn" data-diff="hard">Difficile<br><small style="font-size:11px;opacity:0.7">Anche riserve</small></button>
      </div>
    </div>

    <button class="btn-start" id="btn-start">⚽ Inizia Partita</button>
  </div>

  <!-- GAME -->
  <div id="game-screen">
    <div class="game-header">
      <div class="game-title">Round <span id="round-num">1</span></div>
      <div class="round-badge" id="round-badge">Turno 1</div>
      <div class="clue-counter"><span id="clues-shown">0</span>/<span id="clues-total">?</span> squadre</div>
    </div>

    <div id="loading-state" class="loading-state">
      <div class="spinner"></div>
      <div class="loading-text">Generazione calciatore...</div>
    </div>

    <div id="game-content" style="display:none">
      <div class="clubs-container" id="clubs-container"></div>

      <div class="last-clue-notice" id="last-clue-notice">🔥 Ultima squadra — risposte infinite!</div>
      <div class="correct-answer-reveal" id="correct-answer-reveal">
        <div class="label">La risposta era</div>
        <div class="name" id="correct-name"></div>
      </div>

      <div class="turn-panel">
        <div class="turn-label">Tocca a</div>
        <div class="turn-name" id="current-turn">—</div>
      </div>

      <div class="feedback-toast" id="feedback-toast"></div>

      <div class="guess-area">
        <div class="autocomplete-wrap">
          <input id="guess-input" type="text" placeholder="Scrivi il nome del calciatore..." autocomplete="off">
          <div class="autocomplete-list" id="autocomplete-list" style="display:none"></div>
        </div>
        <button class="btn-guess" id="btn-guess">Conferma</button>
      </div>

      <div class="waiting-panel">
        <div class="waiting-label">In attesa</div>
        <div class="waiting-list" id="waiting-list"></div>
      </div>

      <button class="btn-next-clue" id="btn-next-clue">Prossima squadra →</button>
    </div>
  </div>

  <!-- WIN -->
  <div id="win-screen">
    <div class="win-emoji">🏆</div>
    <div class="win-title">Indovinato!</div>
    <div class="win-subtitle">Ha vinto</div>
    <div class="win-player-name" id="win-player-name"></div>
    <div class="win-clubs-used" id="win-clubs-used"></div>

    <div class="scores-table">
      <div class="scores-table-header">Punteggio totale</div>
      <div id="scores-body"></div>
    </div>

    <button class="btn-new-round" id="btn-new-round">▶ Prossimo round</button>
    <button class="btn-end-game" id="btn-end-game">Fine partita</button>
  </div>
</div>

<script>
// =====================
// LEAGUE CONFIG
// =====================
const LEAGUES = {
  premier:    { name: 'Premier League', flag: '🏴󠁧󠁢󠁥󠁮󠁧󠁿', color: '#3d0099' },
  seriea:     { name: 'Serie A',         flag: '🇮🇹',         color: '#0066cc' },
  laliga:     { name: 'La Liga',          flag: '🇪🇸',         color: '#e30613' },
  bundesliga: { name: 'Bundesliga',       flag: '🇩🇪',         color: '#d20515' },
  ligue1:     { name: 'Ligue 1',          flag: '🇫🇷',         color: '#f0941f' },
};

// =====================
// STATE
// =====================
let state = {
  players: [],
  scores: {},
  difficulty: 'medium',
  round: 1,
  // current round
  footballer: null,      // { name, clubs: [{name, league}] }
  allPlayers: [],        // name list for autocomplete
  cluesShown: 0,
  currentTurnIdx: 0,
  waitingPlayers: [],    // indices of players still active this clue-cycle
  skippedThisClue: [],   // indices who guessed wrong this clue
  lastClueInfinite: false,
  roundOver: false,
};

// =====================
// DOM
// =====================
const $setup    = document.getElementById('setup-screen');
const $game     = document.getElementById('game-screen');
const $win      = document.getElementById('win-screen');
const $loading  = document.getElementById('loading-state');
const $content  = document.getElementById('game-content');
const $roundNum = document.getElementById('round-num');
const $roundBadge = document.getElementById('round-badge');
const $cluesShown = document.getElementById('clues-shown');
const $cluesTotal = document.getElementById('clues-total');
const $clubs    = document.getElementById('clubs-container');
const $turn     = document.getElementById('current-turn');
const $feedback = document.getElementById('feedback-toast');
const $guessInput = document.getElementById('guess-input');
const $btnGuess = document.getElementById('btn-guess');
const $waiting  = document.getElementById('waiting-list');
const $btnNext  = document.getElementById('btn-next-clue');
const $lastNotice = document.getElementById('last-clue-notice');
const $correctReveal = document.getElementById('correct-answer-reveal');
const $correctName = document.getElementById('correct-name');

// =====================
// SETUP
// =====================
document.getElementById('btn-add-player').addEventListener('click', () => {
  const list = document.getElementById('player-list');
  const count = list.children.length + 1;
  if (count > 8) return;
  const row = document.createElement('div');
  row.className = 'player-row';
  row.innerHTML = `
    <input class="player-input" type="text" placeholder="Nome giocatore ${count}" maxlength="30">
    <button class="btn-remove" onclick="this.parentElement.remove()">✕</button>
  `;
  list.appendChild(row);
});

document.querySelectorAll('.diff-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    state.difficulty = btn.dataset.diff;
  });
});

document.getElementById('btn-start').addEventListener('click', startGame);

async function startGame() {
  const inputs = document.querySelectorAll('.player-input');
  const names = [...inputs].map(i => i.value.trim()).filter(Boolean);
  if (names.length < 2) {
    alert('Aggiungi almeno 2 giocatori!');
    return;
  }
  state.players = names;
  state.scores = {};
  names.forEach(n => state.scores[n] = 0);
  state.round = 1;

  $setup.style.display = 'none';
  $game.style.display = 'block';
  await startRound();
}

// =====================
// ROUND
// =====================
async function startRound() {
  $win.style.display = 'none';
  $game.style.display = 'block';
  $loading.style.display = 'block';
  $content.style.display = 'none';
  $correctReveal.style.display = 'none';
  $lastNotice.style.display = 'none';
  $roundNum.textContent = state.round;
  $roundBadge.textContent = `Round ${state.round}`;

  state.clubs_container = [];
  state.cluesShown = 0;
  state.currentTurnIdx = 0;
  state.waitingPlayers = state.players.map((_, i) => i);
  state.skippedThisClue = [];
  state.roundOver = false;
  state.lastClueInfinite = false;

  $clubs.innerHTML = '';
  hideFeedback();

  try {
    await fetchFootballer();
  } catch(e) {
    console.error(e);
    $loading.innerHTML = '<div class="loading-text">Errore. Riprova.</div>';
  }
}

async function fetchFootballer() {
  const diffPrompt = {
    easy: 'Very famous players, e.g. Ronaldo, Messi, Neymar, Mbappé, Haaland, Lewandowski, Salah, etc.',
    medium: 'Well-known players in the top 5 European leagues, including stars and solid first-team players.',
    hard: 'Any player who has played in the top 5 European leagues, including squad players and lesser-known names.',
  }[state.difficulty];

  const prompt = `You are a football trivia game generator. Generate a real football player who has played in at least one of the top 5 European leagues (Premier League, Serie A, La Liga, Bundesliga, Ligue 1).

Difficulty: ${diffPrompt}

Rules:
- Only include clubs from the top 5 European leagues (no national teams, no minor leagues)
- List clubs in chronological order (oldest first)
- Include loan spells if significant
- Between 2 and 8 clubs total
- Use exact official club names

Respond ONLY with a valid JSON object, no markdown, no explanation:
{
  "name": "Full Player Name",
  "clubs": [
    {"name": "Club Name", "league": "premier|seriea|laliga|bundesliga|ligue1"},
    ...
  ]
}`;

  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 1000,
      messages: [{ role: 'user', content: prompt }]
    })
  });

  const data = await res.json();
  const text = data.content.map(c => c.text || '').join('');
  const cleaned = text.replace(/```json|```/g, '').trim();
  state.footballer = JSON.parse(cleaned);
  state.allPlayers = [state.footballer.name]; // minimal list for autocomplete

  // Also fetch a list of similar players for autocomplete decoys
  await fetchPlayerList();

  $cluesTotal.textContent = state.footballer.clubs.length;
  $loading.style.display = 'none';
  $content.style.display = 'block';

  renderWaiting();
  revealNextClue();
}

async function fetchPlayerList() {
  // Get a broader list for autocomplete
  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 600,
        messages: [{
          role: 'user',
          content: `List 40 real football players who have played in the top 5 European leagues (Premier League, Serie A, La Liga, Bundesliga, Ligue 1). Mix of eras and difficulties. Include "${state.footballer.name}". Respond ONLY with a JSON array of full name strings, no markdown.`
        }]
      })
    });
    const data = await res.json();
    const text = data.content.map(c => c.text || '').join('');
    const cleaned = text.replace(/```json|```/g, '').trim();
    const list = JSON.parse(cleaned);
    // Deduplicate and ensure our player is in there
    const set = new Set(list.map(n => n.trim()));
    set.add(state.footballer.name);
    state.allPlayers = [...set];
  } catch(e) {
    state.allPlayers = [state.footballer.name];
  }
}

// =====================
// CLUE REVEAL
// =====================
function revealNextClue() {
  if (state.roundOver) return;

  const clubs = state.footballer.clubs;
  const idx = state.cluesShown;

  if (idx >= clubs.length) return;

  const club = clubs[idx];
  const leagueInfo = LEAGUES[club.league] || { flag: '⚽', color: '#555' };

  const badge = document.createElement('div');
  badge.className = 'club-badge';
  badge.innerHTML = `
    <span class="flag">${leagueInfo.flag}</span>
    <span class="league-dot" style="background:${leagueInfo.color}"></span>
    <span>${club.name}</span>
  `;
  $clubs.appendChild(badge);

  state.cluesShown++;
  $cluesShown.textContent = state.cluesShown;

  // Reset for new clue cycle
  state.waitingPlayers = state.players.map((_, i) => i);
  state.skippedThisClue = [];

  // Last clue?
  if (state.cluesShown === clubs.length) {
    state.lastClueInfinite = true;
    $lastNotice.style.display = 'block';
    $btnNext.disabled = true;
    $btnNext.textContent = 'Ultima squadra — risposte infinite';
  } else {
    $btnNext.disabled = false;
    $btnNext.textContent = 'Prossima squadra →';
  }

  nextTurn();
}

// =====================
// TURN LOGIC
// =====================
function nextTurn() {
  if (state.roundOver) return;

  // Find next active player
  const active = state.waitingPlayers.filter(i => !state.skippedThisClue.includes(i));

  if (active.length === 0) {
    if (state.lastClueInfinite) {
      // Infinite mode: reset all players
      state.skippedThisClue = [];
      state.currentTurnIdx = 0;
      updateTurn();
    } else {
      // All guessed wrong this clue → next clue
      showFeedback('Tutti hanno sbagliato! Prossima squadra...', 'wrong');
      $guessInput.disabled = true;
      $btnGuess.disabled = true;
      setTimeout(() => {
        if (!state.roundOver) revealNextClue();
      }, 1500);
    }
    return;
  }

  // Pick first active player in round-robin
  let found = false;
  for (let i = 0; i < state.players.length; i++) {
    const idx = (state.currentTurnIdx + i) % state.players.length;
    if (active.includes(idx)) {
      state.currentTurnIdx = idx;
      found = true;
      break;
    }
  }
  if (!found) { state.currentTurnIdx = active[0]; }

  updateTurn();
}

function updateTurn() {
  const name = state.players[state.currentTurnIdx];
  $turn.textContent = name.toUpperCase();
  $guessInput.value = '';
  $guessInput.disabled = false;
  $btnGuess.disabled = false;
  hideFeedback();
  hideAutocomplete();
  $guessInput.focus();
  renderWaiting();
}

function renderWaiting() {
  const active = state.players.filter((_, i) => i !== state.currentTurnIdx);
  $waiting.innerHTML = active.map((name, _) => {
    const origIdx = state.players.indexOf(name);
    const skipped = state.skippedThisClue.includes(origIdx);
    return `<span class="waiting-chip ${skipped ? 'skipped' : ''}">${name}</span>`;
  }).join('');
}

// =====================
// GUESS LOGIC
// =====================
$btnGuess.addEventListener('click', submitGuess);
$guessInput.addEventListener('keydown', e => { if (e.key === 'Enter') submitGuess(); });

function submitGuess() {
  const val = $guessInput.value.trim();
  if (!val) return;

  const correct = state.footballer.name;
  const isCorrect = val.toLowerCase() === correct.toLowerCase();

  if (isCorrect) {
    handleWin();
  } else {
    handleWrong();
  }
}

function handleWin() {
  const winner = state.players[state.currentTurnIdx];
  const cluesUsed = state.cluesShown;
  const maxClues = state.footballer.clubs.length;
  const pts = maxClues - cluesUsed + 1;

  state.scores[winner] += pts;
  state.roundOver = true;
  $guessInput.disabled = true;
  $btnGuess.disabled = true;
  $btnNext.disabled = true;

  // Show win screen
  setTimeout(() => {
    $game.style.display = 'none';
    $win.style.display = 'block';
    document.getElementById('win-player-name').textContent = winner;
    document.getElementById('win-clubs-used').textContent =
      `Indovinato con ${cluesUsed} squadra${cluesUsed !== 1 ? 'e' : ''} su ${maxClues} · +${pts} punt${pts !== 1 ? 'i' : 'o'}`;

    // Scores
    const sorted = [...state.players].sort((a, b) => state.scores[b] - state.scores[a]);
    const sbody = document.getElementById('scores-body');
    sbody.innerHTML = sorted.map((name, i) => `
      <div class="score-row ${name === winner ? 'winner' : ''}">
        <div class="score-pos">${i + 1}</div>
        <div class="score-name">${name} ${name === winner ? '🏆' : ''}</div>
        <div class="score-pts">${state.scores[name]}</div>
      </div>
    `).join('');
  }, 800);

  showFeedback(`✅ Corretto! Era ${state.footballer.name}!`, 'correct');
}

function handleWrong() {
  const name = state.players[state.currentTurnIdx];
  showFeedback(`❌ Sbagliato, ${name}! ${state.lastClueInfinite ? 'Riprova!' : 'Aspetta la prossima squadra.'}`, 'wrong');

  $guessInput.disabled = true;
  $btnGuess.disabled = true;

  if (!state.lastClueInfinite) {
    state.skippedThisClue.push(state.currentTurnIdx);
    state.currentTurnIdx = (state.currentTurnIdx + 1) % state.players.length;
  }

  setTimeout(() => {
    if (state.roundOver) return;
    if (state.lastClueInfinite) {
      // Infinite: same player can retry but let others go too
      state.currentTurnIdx = (state.currentTurnIdx + 1) % state.players.length;
      $guessInput.value = '';
      updateTurn();
    } else {
      nextTurn();
    }
  }, 1200);
}

// =====================
// NEXT CLUE BUTTON
// =====================
$btnNext.addEventListener('click', () => {
  if (state.cluesShown < state.footballer.clubs.length && !state.roundOver) {
    hideFeedback();
    revealNextClue();
  }
});

// =====================
// AUTOCOMPLETE
// =====================
$guessInput.addEventListener('input', () => {
  const val = $guessInput.value.trim().toLowerCase();
  const list = document.getElementById('autocomplete-list');
  if (!val || val.length < 2) { hideAutocomplete(); return; }

  const matches = state.allPlayers
    .filter(n => n.toLowerCase().includes(val))
    .slice(0, 8);

  if (matches.length === 0) { hideAutocomplete(); return; }

  list.innerHTML = matches.map(n =>
    `<div class="ac-item" data-name="${n}">${n}</div>`
  ).join('');
  list.style.display = 'block';

  list.querySelectorAll('.ac-item').forEach(item => {
    item.addEventListener('click', () => {
      $guessInput.value = item.dataset.name;
      hideAutocomplete();
      $guessInput.focus();
    });
  });
});

document.addEventListener('click', e => {
  if (!e.target.closest('.autocomplete-wrap')) hideAutocomplete();
});

function hideAutocomplete() {
  document.getElementById('autocomplete-list').style.display = 'none';
}

// =====================
// FEEDBACK
// =====================
function showFeedback(msg, type) {
  $feedback.textContent = msg;
  $feedback.className = `feedback-toast ${type}`;
  $feedback.style.display = 'block';
}
function hideFeedback() {
  $feedback.style.display = 'none';
}

// =====================
// WIN SCREEN BUTTONS
// =====================
document.getElementById('btn-new-round').addEventListener('click', () => {
  state.round++;
  startRound();
});

document.getElementById('btn-end-game').addEventListener('click', () => {
  $win.style.display = 'none';
  $setup.style.display = 'block';
  $game.style.display = 'none';
});
</script>
</body>
</html>
